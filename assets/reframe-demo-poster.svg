<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','SFMono-Regular',ui-monospace,Menlo,Consolas,monospace" role="img" aria-label="Reframe launch video — click to render with Hyperframes">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070A12"/><stop offset="0.55" stop-color="#0A1020"/><stop offset="1" stop-color="#0C1426"/>
    </linearGradient>
    <linearGradient id="pacc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34E7D6"/><stop offset="0.5" stop-color="#5BC8FF"/><stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="pglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5BC8FF" stop-opacity="0.22"/><stop offset="1" stop-color="#5BC8FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="pgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" rx="16" fill="url(#pbg)"/>
  <rect width="1280" height="720" rx="16" fill="url(#pgrid)"/>
  <circle cx="980" cy="160" r="360" fill="url(#pglow)"/>

  <!-- player chrome -->
  <rect x="0.5" y="0.5" width="1279" height="719" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <g transform="translate(36,30)" font-size="14" fill="#7E8CA3">
    <circle cx="6" cy="0" r="6" fill="#F062A6"/><circle cx="26" cy="0" r="6" fill="#FFC857"/><circle cx="46" cy="0" r="6" fill="#34E7D6"/>
    <text x="74" y="5" letter-spacing="1">reframe-launch.mp4 — 1920×1080 · 30fps</text>
  </g>

  <!-- scene content: MAP -> agents -> PR -->
  <g transform="translate(120,150)">
    <text x="0" y="-22" font-size="17" fill="#9C8BF5" letter-spacing="3">1 MAPPER → 6 AGENTS · PER PAGE · IN PARALLEL</text>
    <!-- MAP -->
    <rect x="0" y="86" width="120" height="86" rx="14" fill="#0E1A2E" stroke="url(#pacc)" stroke-width="2"/>
    <text x="60" y="123" text-anchor="middle" font-size="22" font-weight="800" fill="#EAF1FB">MAP</text>
    <text x="60" y="146" text-anchor="middle" font-size="13" fill="#7FF0E2">stage 0</text>
    <text x="158" y="138" font-size="34" fill="#5BC8FF" opacity="0.7">→</text>

    <!-- 6 agents grid -->
    <g font-size="20" font-weight="700" fill="#E7F1FF">
      <g transform="translate(210,40)"><rect width="210" height="58" rx="12" fill="#0C1526" stroke="#34E7D6" stroke-opacity="0.6"/><text x="20" y="36">1 · audit</text></g>
      <g transform="translate(440,40)"><rect width="210" height="58" rx="12" fill="#0C1526" stroke="#5BC8FF" stroke-opacity="0.6"/><text x="20" y="36">2 · ux</text></g>
      <g transform="translate(210,110)"><rect width="210" height="58" rx="12" fill="#0C1526" stroke="#7AA8FF" stroke-opacity="0.6"/><text x="20" y="36">3 · design</text></g>
      <g transform="translate(440,110)"><rect width="210" height="58" rx="12" fill="#120E2A" stroke="#8B5CF6" stroke-opacity="0.6"/><text x="20" y="36">6 · compliance</text></g>
      <g transform="translate(210,180)"><rect width="210" height="58" rx="12" fill="#160E26" stroke="#B07CF0" stroke-opacity="0.6"/><text x="20" y="36">4 · code</text></g>
      <g transform="translate(440,180)"><rect width="210" height="58" rx="12" fill="#1E1024" stroke="#F062A6" stroke-opacity="0.6"/><text x="20" y="36">5 · verify</text></g>
    </g>

    <text x="688" y="138" font-size="34" fill="#8B5CF6" opacity="0.7">→</text>

    <!-- PR card -->
    <g transform="translate(740,64)">
      <rect width="280" height="110" rx="16" fill="#0E1F18" stroke="#34E7D6" stroke-width="2"/>
      <circle cx="40" cy="44" r="20" fill="#0E2A1F" stroke="#34E7D6" stroke-width="2"/>
      <path d="M31 45 l6 7 12 -15" stroke="#34E7D6" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="72" y="40" font-size="18" font-weight="800" fill="#EAF1FB">PR opened</text>
      <text x="72" y="64" font-size="15" fill="#7FF0E2">12/12 passing</text>
      <text x="20" y="94" font-size="12" fill="#9AA7BD">reviewer comments embedded</text>
    </g>
  </g>

  <!-- play button -->
  <g transform="translate(640,430)">
    <circle r="58" fill="#0A1224" stroke="url(#pacc)" stroke-width="2.5"/>
    <circle r="58" fill="none" stroke="#34E7D6" stroke-opacity="0.25" stroke-width="10">
      <animate attributeName="r" values="58;74;58" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.35;0;0.35" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <path d="M-16 -24 L26 0 L-16 24 Z" fill="#EAF1FB"/>
  </g>
  <text x="640" y="556" text-anchor="middle" font-size="22" font-weight="700" fill="#EAF1FB">Ship a rebuilt app, <tspan fill="#34E7D6">not a guess.</tspan></text>
  <text x="640" y="588" text-anchor="middle" font-size="15" fill="#8A97AD">render it →  cd video &amp;&amp; npx hyperframes render --output reframe.mp4</text>

  <!-- scrubber -->
  <g transform="translate(36,672)">
    <rect x="0" y="0" width="1208" height="6" rx="3" fill="#1A2438"/>
    <rect x="0" y="0" width="780" height="6" rx="3" fill="url(#pacc)"/>
    <circle cx="780" cy="3" r="8" fill="#EAF1FB"/>
    <text x="0" y="30" font-size="13" fill="#8A97AD">0:09</text>
    <text x="1208" y="30" text-anchor="end" font-size="13" fill="#8A97AD">0:14</text>
  </g>
</svg>
